<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, user-scalable=no">

  <title>
    KaPi-Noy | Admin Login
  </title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100vw;
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family: 'Poppins', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding:0;
      position:relative;
    }

    /* background coffee image with transparency - more visible now */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('coffee.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.65;
      z-index: 0;
      pointer-events: none;
    }

    /* subtle gradient overlay on top of coffee image - reduced opacity to make coffee more visible */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(239,231,214,0.5), rgba(247,242,232,0.55));
      z-index: 0;
      pointer-events: none;
    }

    /* wrapper - slightly smaller */
    .login-wrapper{
      width:90%;
      height:90vh;
      max-width:1000px;
      max-height:620px;
      background:#fff;
      border-radius:32px;
      overflow:hidden;
      display:grid;
      grid-template-columns:400px 1fr;
      box-shadow:0 20px 45px rgba(0,0,0,0.2);
      position:relative;
      z-index:1;
    }

    /* ================= LEFT ================= */
    .login-left{
      padding:32px 30px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      background:rgba(248,243,234,0.96);
      overflow-y:auto;
      scrollbar-width:none;
    }
    .login-left::-webkit-scrollbar{
      display:none;
    }

    .mini-badge{
      display:inline-block;
      background:#fff;
      color:#7b5a35;
      padding:5px 14px;
      border-radius:40px;
      font-size:10px;
      font-weight:700;
      margin-bottom:20px;
      width:max-content;
      box-shadow:0 2px 5px rgba(0,0,0,0.04);
      letter-spacing:0.3px;
    }

    .login-title{
      font-size:26px;
      font-weight:800;
      color:#3f2d1f;
      line-height:1.2;
      margin-bottom:6px;
    }

    .login-sub{
      color:#8b7358;
      font-size:12px;
      margin-bottom:22px;
      line-height:1.4;
    }

    .input-group{
      margin-bottom:14px;
    }

    .input-group input{
      width:100%;
      padding:12px 16px;
      border:none;
      border-radius:20px;
      background:#fff;
      font-size:12px;
      color:#2d2a24;
      box-shadow: inset 0 0 0 1px #eadfce;
      transition:0.2s;
      font-weight:500;
    }

    .input-group input:focus{
      outline:none;
      box-shadow: inset 0 0 0 2px #b68a52, 0 0 0 3px rgba(182,138,82,0.12);
    }

    .login-btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:24px;
      background: linear-gradient(135deg, #5c3d22, #8b5e34);
      color:white;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      transition:0.2s;
      margin-top:8px;
      box-shadow:0 6px 14px rgba(92,61,34,0.18);
      letter-spacing:0.3px;
    }

    .login-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 18px rgba(92,61,34,0.22);
    }

    .error-message{
      margin-top:14px;
      background:#fff0ec;
      color:#c14a2d;
      padding:8px 12px;
      border-radius:18px;
      font-size:11px;
      font-weight:500;
      display:none;
      text-align:center;
    }

    .footer-text{
      margin-top:22px;
      font-size:10px;
      color:#a1896d;
      text-align:center;
      letter-spacing:0.2px;
    }

    /* ================= RIGHT ================= */
    .login-right{
      position:relative;
      overflow:hidden;
      background:rgba(240,227,210,0.88);
    }

    .login-right img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .overlay{
      position:absolute;
      inset:0;
      background: linear-gradient(to top, rgba(0,0,0,0.35), rgba(0,0,0,0.05));
    }

    .right-content{
      position:absolute;
      bottom:22px;
      left:24px;
      color:white;
      z-index:2;
    }

    .right-content h2{
      font-size:24px;
      font-weight:800;
      margin-bottom:4px;
      text-shadow:0 1px 3px rgba(0,0,0,0.25);
    }

    .right-content p{
      font-size:11px;
      opacity:0.94;
      max-width:300px;
      line-height:1.45;
      text-shadow:0 1px 2px rgba(0,0,0,0.25);
    }

    .floating-card{
      position:absolute;
      top:20px;
      right:20px;
      background:rgba(255,255,255,0.94);
      padding:10px 16px;
      border-radius:24px;
      backdrop-filter:blur(10px);
      z-index:3;
      box-shadow:0 10px 18px rgba(0,0,0,0.08);
      text-align:center;
    }

    .floating-card small{
      color:#7f6547;
      font-weight:700;
      font-size:9px;
      letter-spacing:0.4px;
    }

    .floating-card h4{
      margin-top:3px;
      color:#3b2b1f;
      font-size:16px;
      font-weight:800;
    }

    /* ================= LOADING ================= */
    .loading-screen{
      position:fixed;
      inset:0;
      background:rgba(248,243,234,0.96);
      backdrop-filter:blur(12px);
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:999;
    }

    .loader{
      width:44px;
      height:44px;
      border-radius:50%;
      border:5px solid #e5d9cb;
      border-top:5px solid #8b5e34;
      animation:spin 0.9s linear infinite;
    }

    @keyframes spin{
      100%{ transform:rotate(360deg); }
    }

    .loading-text{
      margin-top:14px;
      font-size:13px;
      font-weight:700;
      color:#5c3d22;
    }

    /* responsive adjustments */
    @media (max-height: 650px) {
      .login-wrapper{
        max-height:560px;
      }
      .login-left{
        padding:24px 28px;
      }
      .login-title{
        font-size:23px;
      }
      .mini-badge{
        margin-bottom:14px;
      }
      .login-sub{
        margin-bottom:16px;
        font-size:11px;
      }
      .input-group input{
        padding:10px 14px;
        font-size:11px;
      }
      .login-btn{
        padding:10px;
        font-size:12px;
      }
      .footer-text{
        margin-top:16px;
      }
      .right-content{
        bottom:16px;
        left:20px;
      }
      .right-content h2{
        font-size:20px;
      }
      .right-content p{
        font-size:10px;
      }
      .floating-card{
        top:14px;
        right:14px;
        padding:8px 14px;
      }
      .floating-card h4{
        font-size:14px;
      }
    }

    @media (max-width: 800px) {
      .login-wrapper{
        grid-template-columns:1fr;
        max-height:90vh;
        width:92vw;
        border-radius:28px;
      }
      .login-right{
        display:none;
      }
      .login-left{
        padding:28px 24px;
        justify-content:center;
      }
    }

    @media (max-width: 480px) {
      .login-left{
        padding:22px 20px;
      }
      .login-title{
        font-size:24px;
      }
    }

  </style>
</head>

<body>

<div class="login-wrapper">

  <!-- LEFT SIDE: FORM -->
  <div class="login-left">

    <div class="mini-badge">
      KaPi-Noy Secure Access
    </div>

    <div class="login-title">
      Welcome Back
    </div>

    <div class="login-sub">
      Login to monitor your smart recycling coffee vending machine.
    </div>

    <div class="input-group">
      <input type="email"
             id="email"
             placeholder="Email address"
             autocomplete="off">
    </div>

    <div class="input-group">
      <input type="password"
             id="password"
             placeholder="Password"
             autocomplete="off">
    </div>

    <button class="login-btn"
            onclick="login()">
      Login to Dashboard
    </button>

    <div class="error-message"
         id="loginError">
    </div>

    <div class="footer-text">
      KaPi-Noy Smart Recycling System
    </div>

  </div>

  <!-- RIGHT SIDE: VISUAL + OVERLAY -->
  <div class="login-right">

    <div class="overlay"></div>

    <!-- placeholder image (if kapinoy.png missing, fallback gradient) -->
    <img src="kapinoy.png"
         alt="KaPi-Noy vending"
         onerror="this.style.display='none'; this.parentNode.style.background='linear-gradient(145deg, #dac29c, #b58f64)';">

    <div class="floating-card">
      <small>Real-time Monitoring</small>
      <h4>IoT Dashboard</h4>
    </div>

    <div class="right-content">
      <h2>Smart Coffee Vendo</h2>
      <p>
        Monitor bottle collection, machine status, storage capacity,
        and transactions in real-time.
      </p>
    </div>

  </div>

</div>

<!-- LOADING OVERLAY -->
<div class="loading-screen"
     id="loadingScreen">
  <div class="loader"></div>
  <div class="loading-text">Logging in...</div>
</div>

<script>

  function login(){
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorDiv = document.getElementById("loginError");

    const validEmail = "kapinoy2026@gmail.com";
    const validPassword = "noypika2026";

    if(email === validEmail && password === validPassword){
      document.getElementById("loadingScreen").style.display = "flex";
      localStorage.setItem("kapinoyLoggedIn", "true");
      
      setTimeout(() => {
        window.location.href = "index.html";
      }, 1500);
    } else {
      errorDiv.style.display = "block";
      errorDiv.innerText = "Invalid email or password. Please try again.";
      document.getElementById("password").value = "";
      
      setTimeout(() => {
        errorDiv.style.display = "none";
      }, 3200);
    }
  }

  // enable "Enter" key submit
  document.querySelectorAll("input").forEach(input => {
    input.addEventListener("keypress", function(e) {
      if(e.key === "Enter") {
        login();
      }
    });
  });

  // prevent accidental scroll on body when content fits exactly
  window.addEventListener('touchmove', function(e) {
    if (document.body.scrollHeight <= window.innerHeight) {
      e.preventDefault();
    }
  }, { passive: false });

</script>

</body>
</html>
